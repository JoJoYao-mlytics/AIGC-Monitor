name: Multi-Site AIGC Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # 每小時執行一次 (在每小時的第 0 分鐘)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - '.github/workflows/monitor.yml'

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      DEBUG: 'false'
      CI: 'true'
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    strategy:
      fail-fast: false
      matrix:
        site: [gugu, cmoney, bnext, cnyes, ucar, ucar-motor]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install npm dependencies
        run: |
          npm ci --no-audit --no-fund || npm i --no-audit --no-fund

      - name: Install Playwright browsers with OS deps (chromium)
        run: |
          npx playwright install --with-deps chromium

      - name: Run monitor (node script)
        id: run_script
        continue-on-error: true
        env:
          CLEAR_ON_START: ${{ matrix.site == 'bnext' && 'true' || 'false' }}
        run: |
          SITE_ID=${{ matrix.site }} node src/monitor.js || true

      - name: Collect status
        id: status
        run: |
          # 等待文件寫入完成
          sleep 2
          DATE_DIR=$(ls -1 reports/${{ matrix.site }} 2>/dev/null | tail -n 1 || echo "")
          echo "DEBUG: DATE_DIR=$DATE_DIR"
          echo "date_dir=$DATE_DIR" >> $GITHUB_OUTPUT
          RESULTS_FILE=$(ls -1 reports/${{ matrix.site }}/$DATE_DIR/results/*-results.json 2>/dev/null | tail -n 1 || echo "")
          echo "DEBUG: RESULTS_FILE=$RESULTS_FILE"
          echo "results_file=$RESULTS_FILE" >> $GITHUB_OUTPUT
          # 讀取 status
          STATUS=$(node -e "try{const f=process.env.FILE;if(!f){console.error('No file provided');throw new Error('No file');}const d=require('fs').readFileSync(f,'utf8');const j=JSON.parse(d);console.log(j.status||'failed');}catch(e){console.error('Error:',e.message);console.log('failed');}" FILE="$RESULTS_FILE")
          echo "DEBUG: STATUS=$STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Upload artifacts (reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.site }}-aigc-reports-${{ steps.status.outputs.date_dir }}-${{ github.run_attempt }}
          path: |
            reports/${{ matrix.site }}/**
            screenshots/${{ matrix.site }}/**
            playwright-report/**
          if-no-files-found: warn
          retention-days: 30

  notify-summary:
    needs: run-monitor
    runs-on: ubuntu-latest
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect all results and send summary
        run: |
          echo "Collecting results from all sites..."

          # 收集所有站點的結果
          FAILED_SITES=""
          SUCCESS_SITES=""
          TOTAL_SITES=0
          FAILED_COUNT=0

          for SITE in gugu cmoney bnext cnyes ucar ucar-motor; do
            TOTAL_SITES=$((TOTAL_SITES + 1))

            # 找到該站點最新的 results.json
            RESULTS_FILE=$(find artifacts -path "*/${SITE}-aigc-reports-*/reports/${SITE}/*/results/*-results.json" 2>/dev/null | sort | tail -n 1)

            if [ -z "$RESULTS_FILE" ]; then
              echo "⚠️  $SITE: No results file found"
              FAILED_SITES="${FAILED_SITES}❌ ${SITE}: No results found\n"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              continue
            fi

            echo "Found results for $SITE: $RESULTS_FILE"

            # 讀取 status 和詳細信息
            STATUS=$(jq -r '.status' "$RESULTS_FILE" 2>/dev/null || echo "unknown")
            CHECKS=$(jq -r '[.results | to_entries[] | select(.value == true)] | length' "$RESULTS_FILE" 2>/dev/null || echo "0")
            TOTAL_CHECKS=$(jq -r '.results | length' "$RESULTS_FILE" 2>/dev/null || echo "6")
            ERRORS=$(jq -r '.errors | length' "$RESULTS_FILE" 2>/dev/null || echo "0")

            if [ "$STATUS" = "failed" ]; then
              FAILED_SITES="${FAILED_SITES}❌ ${SITE}: ${CHECKS}/${TOTAL_CHECKS} checks, ${ERRORS} errors\n"
              FAILED_COUNT=$((FAILED_COUNT + 1))
            else
              SUCCESS_SITES="${SUCCESS_SITES}✅ ${SITE}: ${CHECKS}/${TOTAL_CHECKS} checks\n"
            fi
          done

          echo "Summary:"
          echo "Total: $TOTAL_SITES, Failed: $FAILED_COUNT, Success: $((TOTAL_SITES - FAILED_COUNT))"

          # 只有在有失敗時才發送 Slack 通知
          if [ "$FAILED_COUNT" -gt 0 ]; then
            if [ -z "$SLACK_WEBHOOK_URL" ]; then
              echo "No Slack webhook configured, skipping notification"
              exit 0
            fi

            RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

            # 構建訊息
            SUMMARY_TEXT="*Failed: ${FAILED_COUNT}/${TOTAL_SITES} sites*\n\n${FAILED_SITES}"
            if [ -n "$SUCCESS_SITES" ]; then
              SUMMARY_TEXT="${SUMMARY_TEXT}\n${SUCCESS_SITES}"
            fi

            # 發送 Slack 通知
            PAYLOAD=$(jq -n \
              --arg text "AIGC Monitor: ${FAILED_COUNT} site(s) failed" \
              --arg summary "$SUMMARY_TEXT" \
              --arg run_url "$RUN_URL" \
              '{
                text: $text,
                attachments: [
                  {
                    color: "danger",
                    title: "Test Results Summary",
                    title_link: $run_url,
                    text: $summary,
                    mrkdwn_in: ["text"]
                  }
                ]
              }')

            echo "Sending Slack notification..."
            curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
            echo "Slack notification sent"
          else
            echo "All tests passed, no notification needed"
          fi
